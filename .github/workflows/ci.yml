name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: go fmt check
        run: |
          out="$(go fmt ./...)"
          if [ -n "$out" ]; then
            echo "Unformatted files found:"
            echo "$out"
            exit 1
          fi

  # ── Unit Tests ────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.22"]
        include:
          - os: ubuntu-latest
            go-version: "1.23"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          retention-days: 7

  # ── CGO Build Check ──────────────────────────────────────────
  test-cgo:
    name: CGO Build Check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install gcc (macOS)
        if: runner.os == 'macOS'
        run: brew install gcc

      - name: Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-cgo-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-cgo-

      - name: CGO build verification
        env:
          CGO_ENABLED: "1"
        run: go build ./...

  # ── Integration Tests ─────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-integration-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-integration-

      - name: Start seekdb
        run: |
          docker run -d --name seekdb-test -p 2881:2881 oceanbase/seekdb:latest

      - name: Wait for seekdb to be ready
        run: |
          for i in $(seq 1 60); do
            if docker exec seekdb-test mysqladmin ping -h127.0.0.1 -P2881 -uroot 2>/dev/null; then
              echo "seekdb is ready"
              exit 0
            fi
            echo "Waiting for seekdb... attempt $i/60"
            sleep 5
          done
          echo "seekdb failed to start"
          docker logs seekdb-test
          exit 1

      - name: Run integration tests
        run: go test -v -tags integration -race -run TestServer ./...

      - name: Run admin integration tests
        run: go test -v -tags integration -race -run TestAdminClientServerMode ./...

      - name: Cleanup
        if: always()
        run: docker rm -f seekdb-test

  # ── Examples ──────────────────────────────────────────────────
  test-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build examples
        run: go build ./examples/...
