name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Examples
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          for d in examples/*/; do
            name=$(basename "$d")
            ext=""
            [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
              go build -o dist/${name}-${{ matrix.goos }}-${{ matrix.goarch }}${ext} ./$d
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: examples-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*
            libseekdb/seekdb.h
